<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Spider Sketch</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fdfdfd; cursor: crosshair; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let mouse = { x: 0, y: 0 };
    // This array stores the history of where the mouse has been
    let trail = []; 
    const trailLength = 60; // How long the "snake" is

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        mouse.x = width / 2;
        mouse.y = height / 2;
        // Pre-fill trail so it doesn't glitch at start
        for(let i=0; i<trailLength; i++) trail[i] = {x: mouse.x, y: mouse.y};
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    resize();

    function drawLeg(x, y, angle, index) {
        const time = Date.now() * 0.01;
        const side = index % 2 === 0 ? 1 : -1;
        const wave = Math.sin(time + index * 0.5) * 0.5;
        
        const legAngle = angle + (Math.PI / 2 * side) + wave;
        
        ctx.beginPath();
        ctx.strokeStyle = "rgba(0,0,0,0.6)";
        ctx.lineWidth = 1;
        ctx.moveTo(x, y);
        // Joint
        const jX = x + Math.cos(legAngle) * 20;
        const jY = y + Math.sin(legAngle) * 20;
        // Tip
        const tX = jX + Math.cos(legAngle + 0.5 * side) * 15;
        const tY = jY + Math.sin(legAngle + 0.5 * side) * 15;
        
        ctx.lineTo(jX, jY);
        ctx.lineTo(tX, tY);
        ctx.stroke();
    }

    function animate() {
        // Subtle "fading" trail effect for the drawing look
        ctx.fillStyle = "rgba(253, 253, 253, 0.1)";
        ctx.fillRect(0, 0, width, height);

        // Update trail: Add new mouse position to the front
        trail.unshift({ x: mouse.x, y: mouse.y });
        if (trail.length > trailLength) trail.pop();

        // Draw the segments
        // We iterate through the trail and draw "legs" every 5 points
        for (let i = 0; i < trail.length; i += 6) {
            const pos = trail[i];
            const nextPos = trail[i + 1] || trail[i];
            
            // Calculate angle based on movement direction
            const angle = Math.atan2(pos.y - nextPos.y, pos.x - nextPos.x);

            // Draw legs at this segment
            drawLeg(pos.x, pos.y, angle, i);
            
            // Draw body segment
            ctx.beginPath();
            ctx.fillStyle = "#111";
            const size = 8 - (i * 0.1); // Get thinner toward the tail
            ctx.arc(pos.x, pos.y, Math.max(1, size), 0, Math.PI * 2);
            ctx.fill();
        }

        requestAnimationFrame(animate);
    }

    animate();
</script>
</body>
</html>
