<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketching Spider</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fafafa; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let spider = { x: 100, y: 100, angle: 0, speed: 2 };
    let target = { x: 150, y: 150 }; // Initial target so it moves immediately

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        // Keep target within bounds on resize
        target.x = width / 2;
        target.y = height / 2;
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => {
        target.x = e.clientX;
        target.y = e.clientY;
    });
    
    // Support for mobile/touch
    window.addEventListener('touchmove', e => {
        target.x = e.touches[0].clientX;
        target.y = e.touches[0].clientY;
    });

    resize();

    function drawSpider(x, y, angle) {
        const time = Date.now() * 0.008;
        
        // Draw 8 legs
        ctx.strokeStyle = "rgba(0,0,0,0.7)";
        ctx.lineWidth = 1.5;

        for (let i = 0; i < 8; i++) {
            const side = i < 4 ? 1 : -1;
            const legIndex = i % 4;
            
            // Movement logic: The sine wave creates the "stepping"
            const step = Math.sin(time + (legIndex * 1.5)) * 0.4;
            const reach = 0.4 + (legIndex * 0.3);
            const jointAngle = angle + (reach * side) + step;

            const elbowX = x + Math.cos(jointAngle) * 25;
            const elbowY = y + Math.sin(jointAngle) * 25;
            const footX = elbowX + Math.cos(jointAngle + (0.8 * side)) * 20;
            const footY = elbowY + Math.sin(jointAngle + (0.8 * side)) * 20;

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(elbowX, elbowY);
            ctx.lineTo(footX, footY);
            ctx.stroke();
        }

        // Body
        ctx.beginPath();
        ctx.fillStyle = "#111";
        ctx.ellipse(x, y, 12, 10, angle, 0, Math.PI * 2);
        ctx.fill();
    }

    function animate() {
        // To make it look like a drawing, we DON'T clear the whole screen
        // Instead, we draw a very faint white rectangle to slowly fade old frames
        ctx.fillStyle = "rgba(250, 250, 250, 0.05)"; 
        ctx.fillRect(0, 0, width, height);

        // Calculate direction to target
        const dx = target.x - spider.x;
        const dy = target.y - spider.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > 5) {
            spider.angle = Math.atan2(dy, dx);
            spider.x += Math.cos(spider.angle) * spider.speed;
            spider.y += Math.sin(spider.angle) * spider.speed;
        }

        drawSpider(spider.x, spider.y, spider.angle);
        requestAnimationFrame(animate);
    }

    // Start the loop
    animate();
</script>
</body>
</html>
