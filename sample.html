<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketchy Snake Follower</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #e0e0e0; /* Grayish paper color */
        }
        canvas { 
            display: block; 
            filter: contrast(120%) brightness(90%); /* Makes it look more like graphite */
        }
    </style>
</head>
<body>
<canvas id="snakeCanvas"></canvas>

<script>
    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    
    // Snake properties
    const numSegments = 40;
    const segments = [];
    const segmentDist = 8; // Distance between body parts

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        
        for (let i = 0; i < numSegments; i++) {
            segments.push({ x: mouse.x, y: mouse.y });
        }
    }

    window.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    function update() {
        // The head follows the mouse
        segments[0].x += (mouse.x - segments[0].x) * 0.2;
        segments[0].y += (mouse.y - segments[0].y) * 0.2;

        // Each following segment chases the one before it
        for (let i = 1; i < numSegments; i++) {
            const seg = segments[i];
            const prev = segments[i - 1];
            
            const dx = prev.x - seg.x;
            const dy = prev.y - seg.y;
            const angle = Math.atan2(dy, dx);
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > segmentDist) {
                seg.x = prev.x - Math.cos(angle) * segmentDist;
                seg.y = prev.y - Math.sin(angle) * segmentDist;
            }
        }
    }

    function draw() {
        // Fading background creates the "trail" or "path" look
        ctx.fillStyle = "rgba(224, 224, 224, 0.08)"; 
        ctx.fillRect(0, 0, width, height);

        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        // Draw the body as a single sketchy line
        ctx.beginPath();
        ctx.strokeStyle = "rgba(40, 40, 40, 0.6)"; // Pencil color
        ctx.lineWidth = 10;
        
        ctx.moveTo(segments[0].x, segments[0].y);
        
        for (let i = 1; i < segments.length; i++) {
            // Add a tiny bit of "jitter" to make it look hand-drawn
            const jitterX = (Math.random() - 0.5) * 1.5;
            const jitterY = (Math.random() - 0.5) * 1.5;
            ctx.lineTo(segments[i].x + jitterX, segments[i].y + jitterY);
            
            // Gradually make the tail thinner
            ctx.lineWidth = Math.max(1, 12 - i * 0.3);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(segments[i].x + jitterX, segments[i].y + jitterY);
        }

        // Draw the Head/Eyes
        ctx.fillStyle = "#111";
        ctx.beginPath();
        ctx.arc(segments[0].x, segments[0].y, 6, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(() => {
            update();
            draw();
        });
    }

    init();
    draw();

    window.addEventListener('resize', init);
</script>
</body>
</html>
