<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOW! - Amazing Page</title>
    <style>
        /* THE THEME: Energetic Gold & Bright White */
        body {
            /* A bright, exciting gradient */
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* THE CARD: Bright & Energetic */
        .card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
            text-align: center;
            border: 4px solid #ffecd2;
            max-width: 320px;
            /* New animation: A bouncy "happy" pop */
            animation: happy-bounce 2s ease-in-out infinite;
        }

        /* THE IMAGE STYLING */
        .cute-gif {
            width: 100%;
            border-radius: 20px;
            /* A glowing gold shadow to match the "WOW" */
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
            border: 5px solid #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cute-gif:hover {
            transform: scale(1.1) rotate(3deg);
            box-shadow: 0 0 35px rgba(255, 215, 0, 0.8);
        }

        /* TEXT STYLING: Bold and Bright */
        h1 {
            color: #ff4e50;
            font-size: 2rem;
            margin: 20px 0 10px 0;
            font-weight: 900;
            text-shadow: 2px 2px 0px #fff;
        }

        p {
            color: #ff6a00;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 25px;
        }

        /* THE BUTTON: Golden Celebration */
        .btn {
            background: linear-gradient(to right, #ff4e50, #f9d423);
            color: white;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 78, 80, 0.4);
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(255, 78, 80, 0.6);
        }

        /* NEW ANIMATION: Happy Pop */
        @keyframes happy-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

    </style>
</head>
<body>

    <div class="card">
        <img src="WOW.jpg" alt="Amazing reaction" class="cute-gif">
        
        <h1>WOWWW!</h1>
        <p>That is absolutely incredible!</p>
        
        <button class="btn" onclick="celebrate()">Celebrate!</button>
    </div>

    <script>
        function celebrate() {
            alert('🎉 WOOOOHOOO! YOU ARE AMAZING! 🎉');
        }
    </script>

</body>
</html>
