<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uwian Na! ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Modern Gradient Background */
        body {
            background: linear-gradient(135deg, #1f4068, #1b1b2f);
            color: #ffffff;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Important to keep the character from causing scrollbars */
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            transition: all 0.5s ease;
        }

        /* The Character Element (controlled by JS) */
        #walking-character {
            position: absolute;
            width: 120px; /* Adjust size here */
            z-index: 100; /* Keeps it above the container */
            transition: transform 0.1s linear; /* Smooth visual flipping */
            pointer-events: none; /* Allows clicks to pass through it */
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }

        #walking-character img {
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0;
            color: #4caf50;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(76, 175, 80, 0.6);
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 25px;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        #timer {
            font-size: 6rem;
            font-weight: 900;
            font-family: 'Courier New', Courier, monospace;
            color: #ffeb3b;
            text-shadow: 0 0 25px rgba(255, 235, 59, 0.5);
        }

        /* Time is up state */
        .done {
            color: #ff5252 !important;
            animation: pulse 1s infinite alternate;
            text-shadow: 0 0 30px rgba(255, 82, 82, 0.8) !important;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }
    </style>
</head>
<body>

    <div id="walking-character">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZrdjV3Znlscms1YnV1cnoxeG9iY25oZ2N1dHFuaGFnZjIydnh6ciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/IcoYg1W1E4eE5vGueD/giphy.gif" alt="Walking Cartoon">
    </div>

    <div class="container">
        <h1>READY NA?</h1>
        <p>REMAINING TIME UNTIL 5:30 PM</p>
        <div id="timer">00:00:00</div>
    </div>

    <script>
        // Character Movement Logic
        const char = document.getElementById('walking-character');
        let posX = Math.random() * (window.innerWidth - 120); // Initial random X
        let posY = Math.random() * (window.innerHeight - 120); // Initial random Y
        let speedX = 2; // Walking speed
        let speedY = 1.5;

        // Apply initial position
        char.style.left = posX + 'px';
        char.style.top = posY + 'px';

        function animateCharacter() {
            if (fireworksTriggered) {
                // When time is up, make the character 'celebrate' in the center
                posX = (window.innerWidth / 2) - 60;
                posY = (window.innerHeight / 2) - 60;
                char.style.transform = 'scale(1)'; // Face forward/don't flip
                char.style.left = posX + 'px';
                char.style.top = posY + 'px';
                return; // Stop the random walking
            }

            // Update Position
            posX += speedX;
            posY += speedY;

            // Collision detection with the screen edges
            if (posX + 120 > window.innerWidth || posX < 0) {
                speedX = -speedX; // Reverse direction X
            }
            if (posY + 120 > window.innerHeight || posY < 0) {
                speedY = -speedY; // Reverse direction Y
            }

            // Visual 'flip' when changing horizontal direction
            if (speedX > 0) {
                char.style.transform = 'scaleX(1)'; // Facing right
            } else {
                char.style.transform = 'scaleX(-1)'; // Facing left (flipped)
            }

            // Apply new position
            char.style.left = posX + 'px';
            char.style.top = posY + 'px';

            requestAnimationFrame(animateCharacter);
        }

        // Start the walking animation
        requestAnimationFrame(animateCharacter);


        // Timer & Celebration Logic
        let fireworksTriggered = false;

        function launchFireworks() {
            var duration = 15 * 1000; // 15 seconds
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                var particleCount = 50 * (timeLeft / duration);
                // Launch from random spots on the screen
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function updateTimer() {
            const now = new Date();
            const target = new Date();
            target.setHours(17, 30, 0, 0);

            if (now >= target) {
                document.getElementById('timer').innerHTML = "OUT NA!! 🏃‍♂️";
                document.getElementById('timer').classList.add('done');
                
                if (!fireworksTriggered) {
                    launchFireworks();
                    fireworksTriggered = true; // This will also stop the character from walking randomly
                }
                return;
            }

            const diff = target - now;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            const h = hours.toString().padStart(2, '0');
            const m = minutes.toString().padStart(2, '0');
            const s = seconds.toString().padStart(2, '0');

            document.getElementById('timer').innerHTML = `${h}:${m}:${s}`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
