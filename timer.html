<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uwian Na! 🌿</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Nature Background */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            /* High-quality Nature Image */
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        /* Glassmorphism Container */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 3.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        p {
            font-size: 1rem;
            font-weight: 300;
            margin-bottom: 20px;
            color: #e0e0e0;
            letter-spacing: 2px;
        }

        #timer {
            font-size: 6rem;
            font-weight: 800;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        /* Falling Leaves Effect */
        .leaf {
            position: absolute;
            top: -10%;
            z-index: 1;
            user-select: none;
            cursor: default;
            animation: fall 10s linear infinite;
            color: #4caf50;
            opacity: 0.6;
            font-size: 20px;
        }

        @keyframes fall {
            0% { top: -10%; transform: translateX(0) rotate(0deg); }
            100% { top: 110%; transform: translateX(100px) rotate(360deg); }
        }

        /* Time is up state */
        .done {
            color: #a5d6a7 !important; /* Soft nature green */
            animation: glow 1.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #4caf50; }
            to { text-shadow: 0 0 20px #fff, 0 0 30px #81c784; }
        }
    </style>
</head>
<body>

    <div id="leaf-container"></div>

    <div class="container">
        <h1>MALAPIT NA</h1>
        <p>TIME UNTIL 5:30 PM</p>
        <div id="timer">00:00:00</div>
    </div>

    <script>
        // Create falling leaves
        const leafContainer = document.getElementById('leaf-container');
        const leaves = ['🍃', '🌿', '🌱', '🍀'];
        
        function createLeaf() {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = Math.random() * 5 + 5 + 's';
            leaf.innerText = leaves[Math.floor(Math.random() * leaves.length)];
            leafContainer.appendChild(leaf);

            // Remove leaf after it falls
            setTimeout(() => {
                leaf.remove();
            }, 10000);
        }

        setInterval(createLeaf, 500);

        // Timer & Celebration
        let fireworksTriggered = false;

        function launchCelebration() {
            const end = Date.now() + (15 * 1000);
            const colors = ['#ffffff', '#4caf50', '#81c784'];

            (function frame() {
                confetti({
                    particleCount: 2,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 2,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function updateTimer() {
            const now = new Date();
            const target = new Date();
            target.setHours(17, 30, 0, 0);

            if (now >= target) {
                document.getElementById('timer').innerHTML = "OUT NA! 🌱";
                document.getElementById('timer').classList.add('done');
                
                if (!fireworksTriggered) {
                    launchCelebration();
                    fireworksTriggered = true;
                }
                return;
            }

            const diff = target - now;
            const h = Math.floor(diff / (1000 * 60 * 60)).toString().padStart(2, '0');
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            const s = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');

            document.getElementById('timer').innerHTML = `${h}:${m}:${s}`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
