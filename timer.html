<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomb Timer</title>
    <style>
        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #ff3333;
            font-family: 'Courier New', Courier, monospace;
            transition: background-color 0.3s;
        }

        .bomb-casing {
            background: #2b2b2b;
            padding: 40px;
            border: 8px solid #444;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        #timer {
            font-size: 5rem;
            background: #000;
            padding: 20px;
            border: 2px solid #555;
            letter-spacing: 5px;
            margin: 20px 0;
            color: #ff3333;
        }

        /* Explosion: Shake effect */
        .exploded {
            color: #ff9900 !important;
            animation: shake 0.5s infinite;
            text-shadow: 0 0 20px #ff9900;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 1px) rotate(1deg); }
        }

        /* Explosion: Flash effect */
        .detonate {
            animation: explode-flash 0.5s ease-out forwards;
        }

        @keyframes explode-flash {
            0% { background-color: #121212; }
            50% { background-color: #ff4500; }
            100% { background-color: #000; }
        }
    </style>
</head>
<body>

    <div class="bomb-casing">
        <div style="font-size: 1.5rem;">T-MINUS TO DEPARTURE</div>
        <div id="timer">00:00:00</div>
    </div>

    <script>
        function updateTimer() {
            const now = new Date();
            const target = new Date();
            target.setHours(17, 30, 0, 0);

            if (now >= target) {
                const body = document.body;
                const timerEl = document.getElementById('timer');
                
                // Trigger visual effects
                body.classList.add('detonate');
                timerEl.innerHTML = "BOOM!";
                timerEl.classList.add('exploded');
                return;
            }

            const diff = target - now;
            const h = Math.floor(diff / (1000 * 60 * 60)).toString().padStart(2, '0');
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            const s = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
            
            document.getElementById('timer').innerHTML = `${h}:${m}:${s}`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
