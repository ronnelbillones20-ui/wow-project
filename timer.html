<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uwian Na! 🌙</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            /* Dark Nature Background */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        /* Dark Glassmorphism */
        .container {
            text-align: center;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 4rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            color: #4caf50; /* Nature Green */
            text-transform: uppercase;
            letter-spacing: 8px;
            font-weight: 300;
        }

        p {
            font-size: 1rem;
            color: #888;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        #timer {
            font-size: 6.5rem;
            font-weight: 900;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(76, 175, 80, 0.3);
        }

        /* Celebration State */
        .done {
            color: #ffeb3b !important; /* Golden glow */
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0% { text-shadow: 0 0 10px #ffeb3b; transform: scale(1); }
            50% { text-shadow: 0 0 40px #ffeb3b; transform: scale(1.05); }
            100% { text-shadow: 0 0 10px #ffeb3b; transform: scale(1); }
        }

        /* Subtle Dark Particles */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
            animation: float-up 15s infinite linear;
        }

        @keyframes float-up {
            from { transform: translateY(100vh) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            to { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>OUT NA SOON</h1>
        <p>COUNTDOWN TO 5:30 PM</p>
        <div id="timer">00:00:00</div>
    </div>

    <script>
        // Generate subtle floating dark-nature particles (fireflies)
        for(let i = 0; i < 20; i++) {
            let particle = document.createElement('div');
            particle.className = 'particle';
            let size = Math.random() * 4 + 'px';
            particle.style.width = size;
            particle.style.height = size;
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.background = `rgba(76, 175, 80, ${Math.random() * 0.5})`;
            document.body.appendChild(particle);
        }

        let fireworksTriggered = false;

        function triggerFireworks() {
            const end = Date.now() + (15 * 1000); // 15 seconds of fireworks

            (function frame() {
                // Launch from left
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 },
                    colors: ['#4caf50', '#ffffff', '#ffeb3b']
                });
                // Launch from right
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 },
                    colors: ['#4caf50', '#ffffff', '#ffeb3b']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function updateTimer() {
            const now = new Date();
            const target = new Date();
            target.setHours(17, 30, 0, 0);

            if (now >= target) {
                document.getElementById('timer').innerHTML = "OUT NA!!";
                document.getElementById('timer').classList.add('done');
                
                // CRITICAL: This checks if fireworks have already started
                if (!fireworksTriggered) {
                    triggerFireworks();
                    fireworksTriggered = true;
                }
                return;
            }

            const diff = target - now;
            const h = Math.floor(diff / (1000 * 60 * 60)).toString().padStart(2, '0');
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            const s = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');

            document.getElementById('timer').innerHTML = `${h}:${m}:${s}`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
