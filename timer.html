<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uwian Na! ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Pastel Animated Background */
        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: relative;
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        /* The Anime Character Container */
        .character-wrapper {
            position: absolute;
            top: -120px;
            right: -50px;
            width: 150px;
            animation: float 3s ease-in-out infinite;
        }

        .character-wrapper img {
            width: 100%;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 0;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        p {
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 20px;
        }

        #timer {
            font-size: 5rem;
            font-weight: 900;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .done {
            color: #ffeb3b !important;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10px { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="character-wrapper">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZueGZueGZueGZueGZueGZueGZueGZueGZueGZueGZueGZueCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/C9x0nrkuYlqjC/giphy.gif" alt="Cute Anime">
        </div>

        <h1>READY KA NA?</h1>
        <p>Countdown to 5:30 PM</p>
        <div id="timer">00:00:00</div>
    </div>

    <script>
        let fireworksTriggered = false;

        function launchFireworks() {
            var duration = 30 * 1000; // 30 seconds of celebration!
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function updateTimer() {
            const now = new Date();
            const target = new Date();
            target.setHours(17, 30, 0, 0);

            if (now >= target) {
                document.getElementById('timer').innerHTML = "OUT NA!! 🏃‍♂️";
                document.getElementById('timer').classList.add('done');
                
                if (!fireworksTriggered) {
                    launchFireworks();
                    fireworksTriggered = true;
                }
                return;
            }

            const diff = target - now;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            const h = hours.toString().padStart(2, '0');
            const m = minutes.toString().padStart(2, '0');
            const s = seconds.toString().padStart(2, '0');

            document.getElementById('timer').innerHTML = `${h}:${m}:${s}`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
